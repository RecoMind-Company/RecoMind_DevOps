
nameOverride: "recomind-invitation"
fullnameOverride: "recomind-invitation"

nodeSelector: 
  pool: default

replicaCount: 1

image:
  repository: redasaad1234/backend-invitationservice
  tag: latest
  pullPolicy: IfNotPresent

volumeMounts:
  - name: secrets-store
    mountPath: "/mnt/secrets"
    readOnly: true

volumes:
  - name: secrets-store
    csi:
      driver: secrets-store.csi.k8s.io
      readOnly: true
      volumeAttributes:
        secretProviderClass: app-secrets


virtualService:
  enabled: true

service:
  name: invitation-svc
  type: ClusterIP
  http:
    name: http
    port: 8006
    protocol: http
  grpc:
    name: grpc
    port: 5006
    protocol: h2c

destinationRule:
  enabled: true
  tls:
    mode: ISTIO_MUTUAL
  loadBalancer: ROUND_ROBIN
  h2UpgradePolicy: UPGRADE

resources:
  requests:
    cpu: 50m
    memory: 128Mi
  limits:
    cpu: 100m
    memory: 256Mi

env:
  - name: JwtOptions__Audience
    valueFrom:
      configMapKeyRef:
        name: recomind-config
        key: jwt-Audience

  - name: JwtOptions__Issuer
    valueFrom:
      configMapKeyRef:
        name: recomind-config
        key: jwt-Issuer
        
  - name: JwtOptions__DurationInHours
    valueFrom:
      configMapKeyRef:
        name: recomind-config
        key: jwt-Expire

  - name: JwtOptions__SecretKey
    valueFrom:
      secretKeyRef:
        name: app-secrets
        key: Jwt-SecretKey
        
  - name: ConnectionStrings__ProductionConnectionString_Invitation
    valueFrom:
      secretKeyRef:
        name: app-secrets
        key: ProductionConnectionString-Invitation

  - name: Kestrel__Endpoints__Http__Url
    value: "http://0.0.0.0:8006"
  - name: Kestrel__Endpoints__Http__Protocols
    value: "Http1"

  # إعداد منفذ الـ gRPC (بدون TLS)
  - name: Kestrel__Endpoints__Grpc__Url
    value: "http://0.0.0.0:5006"
  - name: Kestrel__Endpoints__Grpc__Protocols
    value: "Http2"