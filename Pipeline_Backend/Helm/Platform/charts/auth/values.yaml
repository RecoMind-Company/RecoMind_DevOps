
nameOverride: "recomind-auth"
fullnameOverride: "recomind-auth"

replicaCount: 2

nodeSelector: 
  pool: default

image:
  repository: redasaad1234/backend-authenticationservice
  tag: latest
  pullPolicy: IfNotPresent

volumeMounts:
  - name: secrets-store
    mountPath: "/mnt/secrets"
    readOnly: true

volumes:
  - name: secrets-store
    csi:
      driver: secrets-store.csi.k8s.io
      readOnly: true
      volumeAttributes:
        secretProviderClass: app-secrets


virtualService:
  enabled: true

service:
  name: auth-svc
  type: ClusterIP
  http:
    name: http
    port: 8011
    protocol: http
  grpc:
    name: grpc
    port: 5011
    protocol: h2c

destinationRule:
  enabled: true
  tls:
    mode: ISTIO_MUTUAL
  loadBalancer: ROUND_ROBIN
  h2UpgradePolicy: UPGRADE

resources:
  requests:
    cpu: 100m
    memory: 128Mi
  limits:
    cpu: 500m
    memory: 256Mi

env:
  - name: JwtOptions__Audience
    valueFrom:
      configMapKeyRef:
        name: recomind-config
        key: jwt-Audience

  - name: JwtOptions__Issuer
    valueFrom:
      configMapKeyRef:
        name: recomind-config
        key: jwt-Issuer
        
  - name: JwtOptions__DurationInHours
    valueFrom:
      configMapKeyRef:
        name: recomind-config
        key: jwt-Expire

  - name: JwtOptions__SecretKey
    valueFrom:
      secretKeyRef:
        name: app-secrets
        key: Jwt-SecretKey
        
  - name: ConnectionStrings__ProdcutionConnectionString_Auth
    valueFrom:
      secretKeyRef:
        name: app-secrets
        key: ProductionConnectionString-Auth
        
  - name: Kestrel__Endpoints__Http__Url
    value: "http://0.0.0.0:8011"
  - name: Kestrel__Endpoints__Http__Protocols
    value: "Http1"

  # إعداد منفذ الـ gRPC (بدون TLS)
  - name: Kestrel__Endpoints__Grpc__Url
    value: "http://0.0.0.0:5011"
  - name: Kestrel__Endpoints__Grpc__Protocols
    value: "Http2"


  - name: email-config__Email
    valueFrom:
      configMapKeyRef:
        name: recomind-config
        key: email-config-Email

  - name: email-config__Password
    valueFrom:
      secretKeyRef:
        name: app-secrets
        key: email-config-Password