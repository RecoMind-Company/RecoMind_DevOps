nameOverride: "rabbitmq"
fullnameOverride: "rabbitmq"

StatefulSet:
  
  image:
    repo: rabbitmq:4.0-management-alpine
    port: 15672
  volumeMounts:
    path: /var/lib/rabbitmq
  volumeClaimTemplates:
    accessModes: ["ReadWriteOnce"]
    storage: 8Gi

env:
- name: RABBITMQ_DEFAULT_USER
  value: recomind
- name: RABBITMQ_DEFAULT_PASS
  value: recomind
- name: RABBITMQ_ERLANG_COOKIE
  value: ThisIsAStrongErlangCookieValue123

service:
  name: rabbitmq-svc
  type: ClusterIP
  port: 15672

ingress:
    enabled: true
    className: "nginx"
    annotations: 
      cert-manager.io/cluster-issuer: letsencrypt-prod
      nginx.ingress.kubernetes.io/ssl-redirect: "true"
      # جرب استخدام المسار المباشر بدون متغيرات $2
      nginx.ingress.kubernetes.io/rewrite-target: /
      nginx.ingress.kubernetes.io/x-forwarded-prefix: "/rabbitmq"
    hosts:
      - host: api.recomind.site
        paths:
        - path: /rabbitmq/
          pathType: prefix

          backend:
            service:
              name: rabbitmq-svc
              port:
                number: 15672
    tls: 
      - hosts:
        - api.recomind.site
        secretName: recomind-tls-final-aks

    