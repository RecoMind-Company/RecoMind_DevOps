apiVersion: apps/v1
kind: StatefulSet

metadata:
  name: {{ .Chart.Name }}

spec:
  serviceName: {{ .Chart.Name }}-svc
  replicas: 3
  selector:
    matchLabels:
      {{- include "rabbitmq.selectorLabels" . | nindent 4 }}

  template:
    metadata:
      labels:
        {{- include "rabbitmq.labels" . | nindent 4 }}

    spec:
      containers:
      - name: {{ .Chart.Name }}
        image: {{ .Values.StatefulSet.image.repo }}
        ports:
        - containerPort: {{ .Values.StatefulSet.image.port }}

        {{- with .Values.env }}
        env:
        {{- toYaml . | nindent 12 }}
        {{- end }}


        volumeMounts:
        - name: data
          mountPath: {{ .Values.StatefulSet.volumeMounts.path}}


  volumeClaimTemplates:
  - metadata:
      name: data

    spec:
      accessModes: {{ .Values.StatefulSet.volumeClaimTemplates.accessModes}}
      resources:
        requests:
          storage: {{ .Values.StatefulSet.volumeClaimTemplates.storage}}
      
      

        




          
