---
# vars file for Roles
docker_registry: redasaad1234/backend

expose_Ports: 8000

domain_name: api.recomind.site

active_services: "{{ services }}"



services:
  - name: authenticationservice
    port: 8001
    allow_gRPC: true
    gRPC: 5001
    alt: authenticationservice
    volumes:
      - ./Auth/StaticFiles:/app/RecoMindAuthenticationAPI/StaticFiles/Images
    expose_to_nginx: true
    nginx_path: /api/Authentication
    env:
      - .env

  - name: authenticationservice
    port: 8002
    allow_gRPC: true
    gRPC: 5002
    alt: accountservice
    volumes:
      - ./Auth/StaticFiles:/app/RecoMindAuthenticationAPI/StaticFiles/Images
    expose_to_nginx: true
    nginx_path: /api/Account
    env:
      - .env
      

