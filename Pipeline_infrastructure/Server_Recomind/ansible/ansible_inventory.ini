- name: Gather service facts
  ansible.builtin.service_facts:

- name: Detect container runtime service name
  ansible.builtin.set_fact:
    runtime_service_name: >-
      {{
        'containerd' if 'containerd.service' in ansible_facts.services
        else 'containerd.io' if 'containerd.io.service' in ansible_facts.services
        else 'docker' if 'docker.service' in ansible_facts.services
        else ''
      }}

- name: Fail if no known runtime service is present
  ansible.builtin.fail:
    msg: "No supported runtime service found (containerd/containerd.io/docker)."
  when: runtime_service_name == ''

- name: Restart runtime service
  ansible.builtin.service:
    name: "{{ runtime_service_name }}"
    state: restarted
